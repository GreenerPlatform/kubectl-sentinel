<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 140" width="900" height="140">
  <rect width="900" height="140" rx="12" fill="#0d1117"/>
  <rect x="0" y="0" width="6" height="140" rx="3" fill="#326CE5"/>
  <!-- Kubernetes-style 6-spoke wheel (SVG paths, no Unicode) -->
  <g transform="translate(56,70)">
    <circle r="9" fill="#326CE5"/>
