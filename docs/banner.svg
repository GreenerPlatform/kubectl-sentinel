    <rect x="-3.5" y="-30" width="7" height="21" rx="3.5" fill="#326CE5" transform="rotate(120)"/>
    <rect x="-3.5" y="-30" width="7" height="21" rx="3.5" fill="#326CE5" transform="rotate(180)"/>
    <rect x="-3.5" y="-30" width="7" height="21" rx="3.5" fill="#326CE5" transform="rotate(240)"/>
    <rect x="-3.5" y="-30" width="7" height="21" rx="3.5" fill="#326CE5" transform="rotate(300)"/>
  </g>
  <text x="96" y="78" font-family="'Courier New',Courier,monospace" font-size="44" font-weight="700" fill="#f0f6fc">kubectl-sentinel</text>
  <text x="98" y="112" font-family="'Courier New',Courier,monospace" font-size="15" fill="#8b949e">10-section Kubernetes health checker · the fix, not just the finding</text>
